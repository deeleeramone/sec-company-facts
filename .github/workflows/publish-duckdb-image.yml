name: Publish DuckDB container image

# Manual only. Builds the code-only DuckDB image (no Dolt, no MySQL). It does NOT
# bake data in — on first start the container downloads the published parquet
# bundle (the `parquet-latest` Release, refreshed nightly) into its volume and
# serves it directly with embedded DuckDB.
on:
  workflow_dispatch:

concurrency:
  group: publish-duckdb-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=duckdb-latest
            type=sha,prefix=duckdb-,format=short
            type=raw,value=duckdb-{{date 'YYYYMMDD'}}
            type=raw,value=duckdb-{{date 'YYYYMMDD-HHmmss'}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.duckdb
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
