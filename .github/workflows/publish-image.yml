name: Publish container image

# Manual only. The image bakes the Dolt database in as a fast-start baseline;
# running containers self-update from DoltHub (startup pull + read replication),
# so there is no nightly rebuild — re-baking the multi-GB DB every night would be
# wasteful. Rebuild on demand when you want a fresher baked baseline.
on:
  workflow_dispatch:
    inputs:
      bake_data:
        description: 'Clone the DoltHub DB into the image (large layer; uncheck for a code-only image)'
        type: boolean
        default: true

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: true
          # BAKE_DATA clones the public DoltHub repo during the build (no creds).
          build-args: |
            BAKE_DATA=${{ inputs.bake_data }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
