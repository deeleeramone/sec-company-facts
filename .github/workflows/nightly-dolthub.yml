name: Nightly DoltHub refresh

on:
  schedule:
    - cron: '30 7 * * *'   # 07:30 UTC — adjust as desired
  workflow_dispatch:
    inputs:
      skip_push:
        description: 'Run pipeline + commit but skip dolt push (dry run)'
        type: boolean
        default: false

concurrency:
  group: dolthub-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    env:
      DOLT_REPO: deeleeramone/sec-company-facts
      DOLT_SQL_HOST: 127.0.0.1
      DOLT_SQL_PORT: '3306'
      DOLT_SQL_USER: root
      DOLT_SQL_PASSWORD: ''
      DOLT_SQL_DB: sec_company_facts
      SEC_DOWNLOAD_CACHE: ${{ github.workspace }}/.sec-cache

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sec-app (pulls openbb-sec + ingest deps from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install Dolt
        run: |
          sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | bash'
          dolt version

      - name: Configure Dolt identity and DoltHub credential
        env:
          DOLTHUB_CREDENTIAL: ${{ secrets.DOLTHUB_CREDENTIAL }}
        run: |
          dolt config --global --add user.name  "sec-nightly-bot"
          dolt config --global --add user.email "85772166+deeleeramone@users.noreply.github.com"
          printf '%s' "$DOLTHUB_CREDENTIAL" | dolt creds import

      - name: Clone DoltHub repo
        run: dolt clone "$DOLT_REPO" sec_company_facts

      - name: Start dolt sql-server
        working-directory: sec_company_facts
        run: |
          # Detached background process; PID file lets the teardown step kill
          # it deterministically even when the job fails midway.
          nohup dolt sql-server \
              --host 127.0.0.1 \
              --port 3306 \
              --no-auto-commit \
              > "$GITHUB_WORKSPACE/dolt-sqlserver.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/dolt-sqlserver.pid"
          # Wait for the server to accept TCP connections (up to 60s).
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1; then
              echo "dolt sql-server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "dolt sql-server failed to start within 60s; last log lines:"
          tail -n 200 "$GITHUB_WORKSPACE/dolt-sqlserver.log" || true
          exit 1

      - name: Run the SEC update
        run: python -m sec_app.run_pipeline --update

      - name: Rebuild GICS classification table (cik_gics)
        run: python -m sec_app.rebuild_gics

      - name: Garbage collect repository
        working-directory: sec_company_facts
        run: dolt gc --full

      - name: Commit and push to DoltHub via SQL
        if: ${{ ! inputs.skip_push }}
        env:
          COMMIT_MSG_PREFIX: "Nightly SEC refresh"
        run: |
          MSG="${COMMIT_MSG_PREFIX} ($(date -u +%Y-%m-%d))"
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u root \
            -e "USE \`${DOLT_SQL_DB}\`; CALL DOLT_ADD('-A'); CALL DOLT_COMMIT('--skip-empty', '-m', '${MSG}'); CALL DOLT_PUSH('origin', 'main');"

      - name: Commit only (dry run) via SQL
        if: ${{ inputs.skip_push }}
        env:
          COMMIT_MSG_PREFIX: "Nightly SEC refresh DRY RUN"
        run: |
          MSG="${COMMIT_MSG_PREFIX} ($(date -u +%Y-%m-%d))"
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -u root \
            -e "USE \`${DOLT_SQL_DB}\`; CALL DOLT_ADD('-A'); CALL DOLT_COMMIT('--skip-empty', '-m', '${MSG}'); SELECT 'push skipped' AS note;"
      - name: Export parquet bundle from the running sql-server
        if: ${{ ! inputs.skip_push }}
        env:
          DUCKDB_TEMP_DIR: /mnt/duckdb-tmp
          DUCKDB_MEMORY_LIMIT: 5GB
        run: |
          sudo mkdir -p /mnt/duckdb-tmp /mnt/parquet-out
          sudo chown "$(id -un)" /mnt/duckdb-tmp /mnt/parquet-out
          python -m sec_app.export_parquet \
            --source server --server "127.0.0.1:${DOLT_SQL_PORT}/${DOLT_SQL_DB}" \
            --out /mnt/parquet-out --shard-bytes 1500MB
          ls -lh /mnt/parquet-out

      - name: Publish parquet bundle to GitHub Release
        if: ${{ ! inputs.skip_push }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view parquet-latest >/dev/null 2>&1 \
            || gh release create parquet-latest \
                 --title "SEC parquet bundle (latest)" \
                 --notes "DuckDB-ready parquet export of the SEC dataset. Rebuilt nightly by the DoltHub refresh workflow."
          gh release upload parquet-latest /mnt/parquet-out/*.parquet --clobber
          gh release upload parquet-latest /mnt/parquet-out/manifest.json --clobber

      - name: Stop dolt sql-server
        if: always()
        run: |
          if [ -f "$GITHUB_WORKSPACE/dolt-sqlserver.pid" ]; then
            pid=$(cat "$GITHUB_WORKSPACE/dolt-sqlserver.pid")
            kill "$pid" 2>/dev/null || true
            # Give it a moment to shut down cleanly before SIGKILL.
            for i in $(seq 1 10); do
              if kill -0 "$pid" 2>/dev/null; then sleep 1; else break; fi
            done
            kill -9 "$pid" 2>/dev/null || true
          fi
          if [ -f "$GITHUB_WORKSPACE/dolt-sqlserver.log" ]; then
            echo "==== dolt sql-server last 200 log lines ===="
            tail -n 200 "$GITHUB_WORKSPACE/dolt-sqlserver.log" || true
          fi

      - name: Upload dolt sql-server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dolt-sqlserver-log
          path: dolt-sqlserver.log
          if-no-files-found: ignore
