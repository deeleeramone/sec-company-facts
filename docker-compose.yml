services:
  widgets:
    # Pull the published image with `docker compose pull`, or build locally with
    # `docker compose build` (the build section below takes over in that case).
    image: ${WIDGETS_IMAGE:-ghcr.io/deeleeramone/sec-company-facts:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    environment:
      DOLT_SQL_DB: ${DOLT_SQL_DB:-sec_company_facts}
      DOLT_SQL_HOST: 127.0.0.1
      DOLT_SQL_PORT: 3306
      DOLT_REMOTE: ${DOLT_REMOTE:-deeleeramone/sec-company-facts}
      GOMEMLIMIT: ${GOMEMLIMIT:-1536MiB}
      GOGC: ${GOGC:-30}
      WIDGETS_WORKERS: ${WIDGETS_WORKERS:-1}
    ports:
      - "${WIDGETS_PORT:-8000}:8000"
    volumes:
      # One reusable named volume for the whole data dir. The container clones the
      # DB from DoltHub into /data/sec_company_facts on first start and reuses it on
      # every subsequent run — no re-download. To use an existing host clone
      # instead, replace this line with:  - /abs/path/to/clone:/data/sec_company_facts
      - sec_dolt_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIDGETS_MEMORY_LIMIT:-2G}
    mem_limit: ${WIDGETS_MEMORY_LIMIT:-2G}
    memswap_limit: ${WIDGETS_MEMORY_LIMIT:-2G}

volumes:
  sec_dolt_data:
