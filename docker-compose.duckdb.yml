services:
  widgets-duckdb:
    image: ${WIDGETS_DUCKDB_IMAGE:-ghcr.io/deeleeramone/sec-company-facts:duckdb-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.duckdb
    environment:
      SEC_BACKEND: duckdb
      SEC_PARQUET_DIR: /data/parquet
      PARQUET_MANIFEST_URL: ${PARQUET_MANIFEST_URL:-https://github.com/deeleeramone/sec-company-facts/releases/download/parquet-latest/manifest.json}
      DUCKDB_THREADS: ${DUCKDB_THREADS:-}
      DUCKDB_MEMORY_LIMIT: ${DUCKDB_MEMORY_LIMIT:-}
      WIDGETS_WORKERS: ${WIDGETS_WORKERS:-1}
    ports:
      - "${WIDGETS_PORT:-8000}:8000"
    volumes:
      - sec_parquet_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WIDGETS_MEMORY_LIMIT:-2G}
    mem_limit: ${WIDGETS_MEMORY_LIMIT:-2G}
    memswap_limit: ${WIDGETS_MEMORY_LIMIT:-2G}

volumes:
  sec_parquet_data:
    name: sec_parquet_data
